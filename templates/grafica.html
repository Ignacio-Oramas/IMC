<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Progreso - Fitness App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="\static\plotly.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        #chart {
            width: 100%;
            height: 500px;
        }
    </style>
</head>

<body
    class="bg-slate-950 text-slate-200 min-h-screen py-10 px-4 sm:px-6 lg:px-8 flex flex-col items-center relative overflow-hidden">

    <!-- Background Decorators -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[40%] rounded-full bg-purple-600/20 blur-[100px]">
        </div>
    </div>

    <!-- Top Navigation Simple -->
    <div class="w-full max-w-5xl flex justify-start mb-6 z-10">
        <a href="/dashboard_usuario/{{ dni }}"
            class="inline-flex items-center gap-2 px-4 py-2 bg-slate-900/80 border border-slate-800 text-slate-400 hover:text-white hover:border-slate-700 rounded-xl transition-all shadow-lg backdrop-blur-sm">
            <i class="fa-solid fa-arrow-left"></i> Volver al Perfil
        </a>
    </div>

    <div
        class="w-full max-w-5xl bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl shadow-2xl p-6 md:p-8 relative z-10">
        <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-800 flex-wrap gap-4">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-xl bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 flex items-center justify-center text-xl">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Evolución del Peso</h1>
                    <p class="text-slate-400 text-sm mt-1">Análisis gráfico del progreso histórico</p>
                </div>
            </div>

            <!-- FILTRO DE RANGO DE AÑOS -->
            <form method="GET" action="/grafica_usuario/{{ dni }}"
                class="flex items-center gap-3 bg-slate-950/50 p-2 rounded-xl border border-slate-800">
                <div class="flex items-center gap-2">
                    <span class="text-sm text-slate-400 pl-2">Desde:</span>
                    <input type="number" name="anio_inicio" value="{{ anio_inicio }}" placeholder="2020"
                        class="w-20 px-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200 text-sm">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-sm text-slate-400">Hasta:</span>
                    <input type="number" name="anio_fin" value="{{ anio_fin }}" placeholder="2024"
                        class="w-20 px-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200 text-sm">
                </div>
                <button type="submit"
                    class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition-colors shadow-md shadow-indigo-500/20">
                    Filtrar
                </button>
            </form>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for category, message in messages %}
            <div
                class="px-4 py-3 rounded-xl text-sm font-medium flex items-center gap-2 {% if category == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-emerald-500/10 text-emerald-400 border border-emerald-500/20{% endif %}">
                <i
                    class="fa-solid {% if category == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <div class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 md:p-6 overflow-hidden shadow-inner">
            <div id="chart" class="w-full rounded-xl overflow-hidden"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            {% if graphJSON %}
            var graphs = {{ graphJSON | safe
        }};
        if (graphs && graphs.layout) {
            // Detectar si el JSON configuró colors para modo oscuro para que se mezcle mejor
            graphs.layout.paper_bgcolor = 'rgba(0,0,0,0)';
            graphs.layout.plot_bgcolor = 'rgba(0,0,0,0)';
            graphs.layout.font = { color: '#94a3b8' };
            graphs.layout.xaxis = Object.assign({}, graphs.layout.xaxis || {}, { gridcolor: '#1e293b' });
            graphs.layout.yaxis = Object.assign({}, graphs.layout.yaxis || {}, { gridcolor: '#1e293b' });

            Plotly.newPlot('chart', graphs.data, graphs.layout, { responsive: true });
        }
        {% else %}
        document.getElementById('chart').innerHTML = '<div class="flex items-center justify-center h-full text-slate-500 py-20"><p><i class="fa-solid fa-chart-line text-2xl mb-2 block text-center"></i> No hay datos suficientes en este rango de fechas.</p></div>';
        {% endif %}
        });
    </script>
</body>

</html>
